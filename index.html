<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #4a69bd);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            position: relative;
            width: 800px;
            height: 600px;
        }

        canvas {
            display: block;
            background-color: #7ec854;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            position: absolute;
            top: 10px;
            right: -45px;
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }

        .game-title {
            color: #fff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        }

        .game-subtitle {
            color: #ffeb3b;
            font-size: 18px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .score-info {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .controls-hint {
            position: absolute;
            bottom: -48px;
            right: 196px;
            color: #fff;
            font-size: 24px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .controls {
            display: flex;
            gap: 20px;
        }

        .key-icon {
            width: 48px;
            height: 48px;
            background-color: #ecf0f1;
            border-radius: 5px;
            color: #34495e;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.1);
        }

        .restart-btn {
            position: absolute;
            top: 578px;
            left: 394px;
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 24px;
            border-radius: 5px;
            cursor: pointer;
        }

        .restart-btn:hover {
            background-color: #d35400;
        }
    </style>
</head>
<body>

        <div class="game-over" id="gameOverScreen">
            <h2 class="game-title">🐦 Flappy Bird 🐦</h2>
            <p style="color: #fff; font-size: 30px;">Press SPACE, CLICK or TAP to Start!</p>
        </div>

        <button class="restart-btn" id="startBtn">▶️ Play Now ▶️</button>
    </div>

                    ctx.arc(centerX, centerY, radius, Math.PI * 2, false);
                    
                    // Fill bird with yellow color and orange outline
                    
                    ctx.fillStyle = '#f39c12';
                    ctx.fill();
